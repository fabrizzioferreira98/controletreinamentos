name: repo-hygiene

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repository hygiene
        run: python ops/scripts/repo/validate_repo_hygiene.py
