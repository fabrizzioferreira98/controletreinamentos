name: validation-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements-dev.txt

      - name: Run minimal CI validation bundle
        run: |
          .venv/bin/python ops/scripts/release/run_ci_validation_minimal.py \
            --frontend-output-dir "${RUNNER_TEMP}/frontend-dist"
