{% extends "base.html" %}
{% block content %}
<div class="page-header"><h1>{{ "Atualizar equipamento" if equipamento else "Cadastrar novo equipamento" }}</h1></div>
<form method="post" class="form-grid">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Nome<input type="text" name="nome" value="{{ equipamento.nome if equipamento else '' }}" required></label>
    <label>Tipo<input type="text" name="tipo" value="{{ equipamento.tipo if equipamento else '' }}" required></label>
    <label class="checkbox-field">
        <span class="checkbox-label-group">
            <span class="checkbox-title">Status do equipamento</span>
            <span class="checkbox-description">Defina se este equipamento deve continuar disponível para novos treinamentos.</span>
        </span>
        <span class="toggle-switch">
            <input type="checkbox" name="ativo" {% if not equipamento or equipamento.ativo %}checked{% endif %}>
            <span class="toggle-slider"></span>
            <span class="toggle-text">Ativo</span>
        </span>
    </label>
    <div class="form-actions full-width">
        <button type="submit">Salvar alterações</button>
        <a class="button-link secondary" href="{{ url_for('cadastros.equipamentos_list') }}">Voltar sem salvar</a>
    </div>
</form>
{% endblock %}
